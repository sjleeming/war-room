<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg:        #111318;
      --surface:   #1a1f2e;
      --surface2:  #222840;
      --border:    #1f2333;
      --border2:   #374151;
      --text:      #e5e7eb;
      --text2:     #9ca3af;
      --text3:     #6b7280;
      --danger:    #ef4444;

      --blue:      #3b82f6;
      --purple:    #a855f7;
      --teal:      #14b8a6;
      --amber:     #f59e0b;
      --green:     #22c55e;
      --coral:     #f97316;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Tab Bar ── */
    #tab-bar {
      display: flex;
      gap: 2px;
      padding: 10px 16px 0;
      background: #0d1017;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .tab {
      padding: 8px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--text); }
    .tab[data-tab="home"].active  { border-color: var(--text2); color: var(--text); }
    .tab[data-tab="tasks"].active     { border-color: var(--blue);   color: var(--blue); }
    .tab[data-tab="watchlist"].active { border-color: var(--purple); color: var(--purple); }
    .tab[data-tab="calendar"].active  { border-color: var(--teal);   color: var(--teal); }
    .tab[data-tab="notes"].active     { border-color: var(--amber);  color: var(--amber); }
    .tab[data-tab="habits"].active    { border-color: var(--green);  color: var(--green); }
    .tab[data-tab="links"].active     { border-color: var(--coral);  color: var(--coral); }

    /* ── Sections ── */
    .section {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.18s ease;
    }
    .section.active { display: block; }

    /* ── Section heading ── */
    .section-heading {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    #section-tasks    .section-heading { color: var(--blue); }
    #section-watchlist .section-heading { color: var(--purple); }
    #section-calendar  .section-heading { color: var(--teal); }
    #section-notes     .section-heading { color: var(--amber); }
    #section-habits    .section-heading { color: var(--green); }
    #section-links     .section-heading { color: var(--coral); }

    /* ── Shared card ── */
    .card {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text2);
    }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

    /* ── Inputs ── */
    .input {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--blue); }
    select.input { cursor: pointer; }

    /* ── Fade transition ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .tab { padding: 8px 10px; font-size: 12px; }
      .section { padding: 16px 12px; }
    }

    /* ── Home ── */
    #home-header {
      margin-bottom: 28px;
    }
    #home-clock {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    #home-date {
      font-size: 14px;
      color: var(--text3);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    #home-greeting {
      font-size: 16px;
      color: var(--text2);
      font-weight: 500;
    }
    #home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .home-card {
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .home-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    .home-card-header {
      padding: 8px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .home-card-body {
      padding: 10px 12px 14px;
    }
    .home-card-item {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .home-card-item.urgent { color: var(--danger); }
    .home-card-empty { font-size: 12px; color: var(--text3); font-style: italic; }

    @media (max-width: 600px) {
      #home-grid { grid-template-columns: 1fr 1fr; }
      #home-clock { font-size: 36px; }
    }

    /* ── Tasks ── */
    #tasks-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    #tasks-add-row .input { flex: 1; }
    #tasks-filters {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .filter-btn {
      font-size: 13px;
      color: var(--text3);
      cursor: pointer;
      padding-bottom: 2px;
      border-bottom: 1.5px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .filter-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 6px;
      border-left: 3px solid transparent;
    }
    .task-item.priority { border-left-color: var(--danger); }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }
    .task-check {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border2);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .task-check.checked { background: var(--blue); border-color: var(--blue); }
    .task-check.checked::after { content: '✓'; color: #fff; font-size: 10px; }
    .task-text { flex: 1; font-size: 14px; }
    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--danger);
      background: #ef444420;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .task-delete {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
    }
    .task-delete:hover { color: var(--danger); }
    #tasks-empty { color: var(--text3); font-size: 14px; text-align: center; padding: 32px 0; }

    /* ── Morning Check-in Overlay ── */
    #checkin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #checkin-overlay.visible { display: flex; }
    #checkin-box {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 480px;
      width: 90%;
      border: 1px solid var(--border2);
    }
    #checkin-box h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    #checkin-box p {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 20px;
    }
    .checkin-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .checkin-item:last-child { border-bottom: none; }
    .checkin-item-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
    }
    .checkin-item-text.priority { color: var(--danger); }
    .btn-carryover {
      background: var(--blue);
      color: #fff;
      padding: 5px 12px;
      border-radius: 5px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-dismiss-ci {
      background: transparent;
      color: var(--text3);
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border2);
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Watchlist ── */
    #watch-add-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    #watch-add-row .input { flex: 2; min-width: 160px; }
    #watch-filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .watch-filter-btn {
      font-size: 12px; color: var(--text3); cursor: pointer;
      padding: 4px 10px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border2);
    }
    .watch-filter-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .watch-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface);
      border-radius: 8px; margin-bottom: 6px;
    }
    .watch-title { flex: 1; font-size: 14px; }
    .watch-type {
      font-size: 11px; color: var(--text3);
      background: var(--bg); padding: 2px 8px; border-radius: 10px;
    }
    .watch-status {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 12px; cursor: pointer; user-select: none;
      border: none; font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .watch-status:hover { opacity: 0.8; }
    .watch-status.want       { background: #374151; color: var(--text2); }
    .watch-status.inprogress { background: var(--purple); color: #fff; }
    .watch-status.done       { background: #22c55e30; color: var(--green); }
    .watch-delete { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; }
    .watch-delete:hover { color: var(--danger); }

    /* ── Calendar ── */
    #cal-nav { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    #cal-month-label { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; flex: 1; }
    .cal-nav-btn { background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    #cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
    .cal-dow { text-align: center; font-size: 11px; color: var(--text3); padding: 6px 0; font-weight: 600; letter-spacing: 0.5px; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer; position: relative;
      font-size: 13px; color: var(--text2); transition: background 0.15s;
    }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.today { background: var(--teal); color: #fff; font-weight: 700; }
    .cal-day.selected { outline: 2px solid var(--teal); outline-offset: -2px; }
    .cal-day.other-month { color: var(--text3); opacity: 0.4; }
    .cal-dot { width: 4px; height: 4px; background: var(--teal); border-radius: 50%; position: absolute; bottom: 4px; }
    #cal-event-panel { background: var(--surface); border-radius: 10px; padding: 16px; }
    #cal-event-date { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--teal); }
    #cal-event-add { display: flex; gap: 8px; margin-bottom: 12px; }
    #cal-event-add .input { flex: 1; }
    .cal-event-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .cal-event-item:last-child { border-bottom: none; }
    .cal-event-text { flex: 1; font-size: 13px; }
    .cal-event-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; }
    .cal-event-del:hover { color: var(--danger); }
  </style>
</head>
<body>

  <!-- Tab Bar -->
  <nav id="tab-bar">
    <div class="tab active" data-tab="home">Home</div>
    <div class="tab" data-tab="tasks">Tasks</div>
    <div class="tab" data-tab="watchlist">Watchlist</div>
    <div class="tab" data-tab="calendar">Calendar</div>
    <div class="tab" data-tab="notes">Notes</div>
    <div class="tab" data-tab="habits">Habits</div>
    <div class="tab" data-tab="links">Links</div>
  </nav>

  <!-- Sections (shells — content added in later tasks) -->
  <div class="section active" id="section-home">
    <div id="home-header">
      <div id="home-clock">00:00:00</div>
      <div id="home-date"></div>
      <div id="home-greeting"></div>
    </div>
    <div id="home-grid">
      <!-- Cards injected by renderHome() -->
    </div>
  </div>
  <div class="section" id="section-tasks">
    <h2 class="section-heading">Tasks</h2>
    <div id="tasks-add-row">
      <input class="input" id="task-input" placeholder="Add a task…" />
      <button class="btn btn-ghost" id="task-priority-btn" title="Toggle priority">!</button>
      <button class="btn btn-primary" onclick="addTask()">Add</button>
    </div>
    <div id="tasks-filters">
      <button class="filter-btn active" data-filter="all"    onclick="setTaskFilter('all')">All</button>
      <button class="filter-btn"        data-filter="active" onclick="setTaskFilter('active')">Active</button>
      <button class="filter-btn"        data-filter="done"   onclick="setTaskFilter('done')">Done</button>
    </div>
    <div id="tasks-list"></div>
    <div id="tasks-empty" style="display:none">No tasks here.</div>
  </div>
  <div class="section" id="section-watchlist">
    <h2 class="section-heading">Watchlist</h2>
    <div id="watch-add-row">
      <input class="input" id="watch-input" placeholder="Title…" />
      <select class="input" id="watch-type">
        <option value="Film">Film</option>
        <option value="Show">Show</option>
        <option value="Book">Book</option>
        <option value="Other">Other</option>
      </select>
      <button class="btn btn-primary" onclick="addWatchItem()">Add</button>
    </div>
    <div id="watch-filters">
      <button class="watch-filter-btn active" data-wf="All"   onclick="setWatchFilter('All')">All</button>
      <button class="watch-filter-btn" data-wf="Film"   onclick="setWatchFilter('Film')">Film</button>
      <button class="watch-filter-btn" data-wf="Show"   onclick="setWatchFilter('Show')">Show</button>
      <button class="watch-filter-btn" data-wf="Book"   onclick="setWatchFilter('Book')">Book</button>
      <button class="watch-filter-btn" data-wf="Other"  onclick="setWatchFilter('Other')">Other</button>
    </div>
    <div id="watch-list"></div>
  </div>
  <div class="section" id="section-calendar">
    <h2 class="section-heading">Calendar</h2>
    <div id="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <div id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div id="cal-grid"></div>
    <div id="cal-event-panel" style="display:none">
      <div id="cal-event-date"></div>
      <div id="cal-event-add">
        <input class="input" id="cal-event-input" placeholder="Add event or note…" />
        <button class="btn btn-primary" onclick="addCalEvent()">Add</button>
      </div>
      <div id="cal-event-list"></div>
    </div>
  </div>
  <div class="section" id="section-notes"><h2 class="section-heading">Notes</h2></div>
  <div class="section" id="section-habits"><h2 class="section-heading">Habits</h2></div>
  <div class="section" id="section-links"><h2 class="section-heading">Links</h2></div>

  <!-- Morning Check-in Overlay -->
  <div id="checkin-overlay">
    <div id="checkin-box">
      <h2>☀️ Good morning</h2>
      <p>You had unfinished tasks from yesterday. Deal with each one before you start today.</p>
      <div id="checkin-list"></div>
    </div>
  </div>

  <script>
    /* ══════════════════════════════════════
       STORE — localStorage helpers
    ══════════════════════════════════════ */
    const Store = {
      get(key, fallback = null) {
        try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
        catch { return fallback; }
      },
      set(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); }
        catch (e) { console.warn('Store.set failed', e); }
      }
    };

    /* ══════════════════════════════════════
       NAVIGATION
    ══════════════════════════════════════ */
    let currentTab = 'home';

    function navigate(tab) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const section = document.getElementById(`section-${tab}`);
      const tabEl   = document.querySelector(`.tab[data-tab="${tab}"]`);
      if (!section || !tabEl) return;
      section.classList.add('active');
      tabEl.classList.add('active');
      currentTab = tab;
      if (tab !== 'home') renderSection(tab);
    }

    function renderSection(tab) {
      const fns = { tasks: renderTasks, watchlist: renderWatchlist,
                    calendar: renderCalendar, notes: renderNotes,
                    habits: renderHabits, links: renderLinks };
      if (fns[tab]) fns[tab]();
    }

    // Stub render functions — replaced section by section in later tasks
    function renderNotes()     {}
    function renderHabits()    {}
    function renderLinks()     {}

    // Wire tab clicks
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => navigate(tab.dataset.tab));
    });

    /* ══════════════════════════════════════
       TASKS
    ══════════════════════════════════════ */

    let taskFilter   = 'all';
    let taskPriority = false;

    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('task-input');
      if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
      const pb = document.getElementById('task-priority-btn');
      if (pb) pb.addEventListener('click', () => {
        taskPriority = !taskPriority;
        pb.style.color      = taskPriority ? 'var(--danger)' : '';
        pb.style.borderColor = taskPriority ? 'var(--danger)' : '';
      });
    });

    function addTask() {
      const input = document.getElementById('task-input');
      const text  = input.value.trim();
      if (!text) return;
      const todos = Store.get('wr_todos', []);
      todos.push({ id: uid(), text, done: false, priority: taskPriority, createdDate: todayStr() });
      Store.set('wr_todos', todos);
      input.value  = '';
      taskPriority = false;
      document.getElementById('task-priority-btn').style.color = '';
      renderTasks();
    }

    function toggleTask(id) {
      const todos = Store.get('wr_todos', []);
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; Store.set('wr_todos', todos); }
      renderTasks();
    }

    function deleteTask(id) {
      Store.set('wr_todos', Store.get('wr_todos', []).filter(t => t.id !== id));
      renderTasks();
    }

    function setTaskFilter(f) {
      taskFilter = f;
      document.querySelectorAll('#tasks-filters .filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === f)
      );
      renderTasks();
    }

    function renderTasks() {
      let todos = Store.get('wr_todos', []);
      todos.sort((a, b) => (b.priority ? 1 : 0) - (a.priority ? 1 : 0));
      if (taskFilter === 'active') todos = todos.filter(t => !t.done);
      if (taskFilter === 'done')   todos = todos.filter(t =>  t.done);
      const list  = document.getElementById('tasks-list');
      const empty = document.getElementById('tasks-empty');
      if (todos.length === 0) {
        list.innerHTML = '';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      list.innerHTML = todos.map(t => `
        <div class="task-item${t.priority ? ' priority' : ''}${t.done ? ' done' : ''}">
          <div class="task-check${t.done ? ' checked' : ''}" onclick="toggleTask('${t.id}')"></div>
          <span class="task-text">${escHtml(t.text)}</span>
          ${t.priority && !t.done ? '<span class="priority-badge">!</span>' : ''}
          <button class="task-delete" onclick="deleteTask('${t.id}')" title="Delete">×</button>
        </div>
      `).join('');
    }

    function getTaskSummary() {
      const todos = Store.get('wr_todos', []).filter(t => !t.done);
      if (!todos.length) return [{ text: 'All done!', urgent: false }];
      return todos.slice(0, 3).map(t => ({ text: t.text, urgent: t.priority }));
    }

    function uid() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    /* ══════════════════════════════════════
       WATCHLIST
    ══════════════════════════════════════ */

    let watchFilter = 'All';

    document.addEventListener('DOMContentLoaded', () => {
      const wi = document.getElementById('watch-input');
      if (wi) wi.addEventListener('keydown', e => { if (e.key === 'Enter') addWatchItem(); });
    });

    function addWatchItem() {
      const title = document.getElementById('watch-input').value.trim();
      const type  = document.getElementById('watch-type').value;
      if (!title) return;
      const items = Store.get('wr_watch', []);
      items.push({ id: uid(), title, type, status: 'want' });
      Store.set('wr_watch', items);
      document.getElementById('watch-input').value = '';
      renderWatchlist();
    }

    function cycleWatchStatus(id) {
      const items  = Store.get('wr_watch', []);
      const item   = items.find(i => i.id === id);
      const cycle  = { want: 'inprogress', inprogress: 'done', done: 'want' };
      if (item) { item.status = cycle[item.status]; Store.set('wr_watch', items); }
      renderWatchlist();
    }

    function deleteWatchItem(id) {
      Store.set('wr_watch', Store.get('wr_watch', []).filter(i => i.id !== id));
      renderWatchlist();
    }

    function setWatchFilter(f) {
      watchFilter = f;
      document.querySelectorAll('#watch-filters .watch-filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.wf === f)
      );
      renderWatchlist();
    }

    const STATUS_LABELS = { want: 'Want', inprogress: 'In progress', done: 'Done' };

    function renderWatchlist() {
      let items = Store.get('wr_watch', []);
      if (watchFilter !== 'All') items = items.filter(i => i.type === watchFilter);
      document.getElementById('watch-list').innerHTML = items.length
        ? items.map(i => `
          <div class="watch-item">
            <span class="watch-title">${escHtml(i.title)}</span>
            <span class="watch-type">${i.type}</span>
            <button class="watch-status ${i.status}" onclick="cycleWatchStatus('${i.id}')">${STATUS_LABELS[i.status]}</button>
            <button class="watch-delete" onclick="deleteWatchItem('${i.id}')">×</button>
          </div>`).join('')
        : '<p style="color:var(--text3);padding:24px 0;text-align:center">Nothing on the watchlist.</p>';
    }

    function getWatchSummary() {
      const item = Store.get('wr_watch', []).find(i => i.status === 'inprogress');
      if (item) return [{ text: `${item.type}: ${item.title}`, urgent: false }];
      const want = Store.get('wr_watch', []).filter(i => i.status === 'want');
      return want.slice(0, 2).map(i => ({ text: `${i.type}: ${i.title}`, urgent: false }));
    }

    /* ══════════════════════════════════════
       CALENDAR
    ══════════════════════════════════════ */

    let calYear, calMonth, calSelected;

    function calInit() {
      const now = new Date();
      calYear  = now.getFullYear();
      calMonth = now.getMonth();
    }

    function calPrev() {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    }

    function calNext() {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    }

    function renderCalendar() {
      if (calYear === undefined) calInit();
      const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const events = Store.get('wr_calevents', {});
      const today  = todayStr();
      const label  = new Date(calYear, calMonth, 1)
        .toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      document.getElementById('cal-month-label').textContent = label;

      const firstDay   = new Date(calYear, calMonth, 1).getDay();
      const offset     = (firstDay + 6) % 7; // Mon=0
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const prevDays   = new Date(calYear, calMonth, 0).getDate();

      let html = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');

      for (let i = offset - 1; i >= 0; i--) {
        html += `<div class="cal-day other-month">${prevDays - i}</div>`;
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const key    = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = key === today;
        const isSel   = key === calSelected;
        const hasDot  = events[key] && events[key].length > 0;
        html += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="calSelect('${key}')">
          ${d}${hasDot ? '<div class="cal-dot"></div>' : ''}
        </div>`;
      }
      const total     = offset + daysInMonth;
      const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let d = 1; d <= remaining; d++) {
        html += `<div class="cal-day other-month">${d}</div>`;
      }

      document.getElementById('cal-grid').innerHTML = html;
      if (calSelected) renderCalEvents();
    }

    function calSelect(key) {
      calSelected = key;
      renderCalendar();
    }

    function renderCalEvents() {
      const panel  = document.getElementById('cal-event-panel');
      const events = Store.get('wr_calevents', {});
      const list   = events[calSelected] || [];
      const d      = new Date(calSelected + 'T00:00:00');
      document.getElementById('cal-event-date').textContent =
        d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

      const input = document.getElementById('cal-event-input');
      // Remove any previous keydown listener by replacing the element clone
      const newInput = input.cloneNode(true);
      input.parentNode.replaceChild(newInput, input);
      newInput.addEventListener('keydown', e => { if (e.key === 'Enter') addCalEvent(); });

      document.getElementById('cal-event-list').innerHTML = list.length
        ? list.map(ev => `
            <div class="cal-event-item">
              <span class="cal-event-text">${escHtml(ev.text)}</span>
              <button class="cal-event-del" onclick="deleteCalEvent('${ev.id}')">×</button>
            </div>`).join('')
        : '<p style="color:var(--text3);font-size:13px">No events on this day.</p>';
      panel.style.display = '';
    }

    function addCalEvent() {
      const input = document.getElementById('cal-event-input');
      const text  = input.value.trim();
      if (!text || !calSelected) return;
      const events = Store.get('wr_calevents', {});
      if (!events[calSelected]) events[calSelected] = [];
      events[calSelected].push({ id: uid(), text });
      Store.set('wr_calevents', events);
      input.value = '';
      renderCalendar();
    }

    function deleteCalEvent(id) {
      const events = Store.get('wr_calevents', {});
      if (events[calSelected]) {
        events[calSelected] = events[calSelected].filter(e => e.id !== id);
        if (!events[calSelected].length) delete events[calSelected];
      }
      Store.set('wr_calevents', events);
      renderCalendar();
    }

    function getCalSummary() {
      const events  = Store.get('wr_calevents', {});
      const todayEv = events[todayStr()] || [];
      if (todayEv.length) return todayEv.slice(0,2).map(e => ({ text: e.text, urgent: false }));
      return [{ text: 'No events today', urgent: false }];
    }

    /* ══════════════════════════════════════
       MORNING CHECK-IN
    ══════════════════════════════════════ */

    function todayStr() {
      return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
    }

    function yesterdayStr() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return d.toISOString().slice(0, 10);
    }

    function runMorningCheckin() {
      const lastOpen = Store.get('wr_lastopen', null);
      const today    = todayStr();
      Store.set('wr_lastopen', today);
      if (lastOpen === today) return; // already opened today

      const todos     = Store.get('wr_todos', []);
      const yesterday = yesterdayStr();
      const leftover  = todos.filter(t =>
        !t.done && t.createdDate && t.createdDate <= yesterday
      );
      if (leftover.length === 0) return;

      const overlay = document.getElementById('checkin-overlay');
      const list    = document.getElementById('checkin-list');
      overlay.classList.add('visible');

      function renderCheckin() {
        const remaining = Store.get('wr_todos', []).filter(t =>
          !t.done && t.createdDate && t.createdDate <= yesterday
        );
        if (remaining.length === 0) {
          overlay.classList.remove('visible');
          return;
        }
        list.innerHTML = remaining.map(t => `
          <div class="checkin-item" id="ci-${t.id}">
            <span class="checkin-item-text${t.priority ? ' priority' : ''}">${escHtml(t.text)}</span>
            <button class="btn-carryover" onclick="checkinCarryover('${t.id}')">Carry over</button>
            <button class="btn-dismiss-ci" onclick="checkinDismiss('${t.id}')">Dismiss</button>
          </div>
        `).join('');
      }

      window.checkinCarryover = function(id) {
        const todos = Store.get('wr_todos', []);
        const idx   = todos.findIndex(t => t.id === id);
        if (idx !== -1) { todos[idx].createdDate = today; Store.set('wr_todos', todos); }
        renderCheckin();
      };

      window.checkinDismiss = function(id) {
        const todos = Store.get('wr_todos', []).filter(t => t.id !== id);
        Store.set('wr_todos', todos);
        renderCheckin();
      };

      renderCheckin();
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ══════════════════════════════════════
       HOME — clock, greeting, summary cards
    ══════════════════════════════════════ */

    const HOLIDAYS = [
      { month: 1,  day: 1,  msg: "Happy New Year! 🎉" },
      { month: 2,  day: 14, msg: "Happy Valentine's Day 💕" },
      { month: 3,  day: 17, msg: "Happy St Patrick's Day 🍀" },
      { month: 10, day: 31, msg: "Happy Halloween 🎃" },
      { month: 11, day: 5,  msg: "Remember, remember — Bonfire Night 🔥" },
      { month: 12, day: 24, msg: "Christmas Eve — almost time! 🎄" },
      { month: 12, day: 25, msg: "Merry Christmas! 🎁" },
      { month: 12, day: 26, msg: "Happy Boxing Day! 🥊" },
      { month: 12, day: 31, msg: "New Year's Eve — one more day! 🥂" },
    ];

    const DAY_MSGS = [
      "Sunday — enjoy the rest.",
      "Monday. Let's go.",
      "Tuesday — build momentum.",
      "Wednesday — halfway there.",
      "Thursday — nearly done.",
      "Happy Friday — almost the weekend.",
      "Saturday — make it count.",
    ];

    function getGreeting() {
      const now  = new Date();
      const m    = now.getMonth() + 1;
      const d    = now.getDate();
      const h    = now.getHours();
      const holiday = HOLIDAYS.find(hd => hd.month === m && hd.day === d);
      if (holiday) return holiday.msg;
      if (h < 12)  return `Good morning. ${DAY_MSGS[now.getDay()]}`;
      if (h < 17)  return `Good afternoon. ${DAY_MSGS[now.getDay()]}`;
      return `Good evening. ${DAY_MSGS[now.getDay()]}`;
    }

    function formatDate(date) {
      return date.toLocaleDateString('en-GB', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('home-clock').textContent =
        now.toLocaleTimeString('en-GB');
      document.getElementById('home-date').textContent = formatDate(now);
      document.getElementById('home-greeting').textContent = getGreeting();
    }

    function renderHome() {
      updateClock();
      const grid = document.getElementById('home-grid');
      const cards = [
        { tab: 'tasks',     label: 'Tasks',     color: 'var(--blue)',   items: getTaskSummary()     },
        { tab: 'watchlist', label: 'Watchlist',  color: 'var(--purple)', items: getWatchSummary()    },
        { tab: 'calendar',  label: 'Calendar',   color: 'var(--teal)',   items: getCalSummary()      },
        { tab: 'notes',     label: 'Notes',      color: 'var(--amber)',  items: getNotesSummary()    },
        { tab: 'habits',    label: 'Habits',     color: 'var(--green)',  items: getHabitsSummary()   },
        { tab: 'links',     label: 'Links',      color: 'var(--coral)',  items: getLinksSummary()    },
      ];
      grid.innerHTML = cards.map(c => `
        <div class="home-card" onclick="navigate('${c.tab}')">
          <div class="home-card-header" style="background:${c.color}22;color:${c.color};border-left:3px solid ${c.color}">
            ${c.label}
          </div>
          <div class="home-card-body">
            ${c.items.length
              ? c.items.map(i => `<div class="home-card-item${i.urgent ? ' urgent' : ''}">${i.text}</div>`).join('')
              : '<div class="home-card-empty">Nothing yet</div>'}
          </div>
        </div>
      `).join('');
    }

    // Summary data providers — return [{text, urgent}] — stubs replaced by section tasks
    function getNotesSummary()   { return []; }
    function getHabitsSummary()  { return []; }
    function getLinksSummary()   { return []; }

    /* ══════════════════════════════════════
       INIT
    ══════════════════════════════════════ */
    runMorningCheckin();
    navigate('home');
    renderHome();
    setInterval(updateClock, 1000);
    setInterval(() => { if (currentTab === 'home') renderHome(); }, 60000);
  </script>
</body>
</html>
